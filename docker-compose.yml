version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: elemento_nautico_db
    environment:
      POSTGRES_USER: elemento_user
      POSTGRES_PASSWORD: elemento_password
      POSTGRES_DB: elemento_nautico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elemento_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elemento_nautico_api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://elemento_user:elemento_password@postgres:5432/elemento_nautico
      WINDY_API_KEY: ${WINDY_API_KEY}
      TIDE_API_KEY: ${TIDE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: npm run dev

volumes:
  postgres_data:
